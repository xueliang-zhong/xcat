# xcat configuration file
# Location: ~/.xcat/config.toml

[display]
# Number all output lines.
number = false
# Number non-empty output lines only.
number_nonblank = false
# Display $ at end of each line.
show_ends = false
# Squeeze repeated blank lines.
squeeze_blank = false
# Display TAB characters as ^I.
show_tabs = false
# Display non-printing characters.
show_nonprinting = false

[color]
# Color mode: "auto", "always", or "never".
mode = "auto"
# Palette name.
theme = "default"
# Optional syntax profile for stdin or ambiguous filenames.
syntax = ""
# Enable lightweight language-aware highlighting.
syntax_highlighting = true

[performance]
# Use memory-mapped I/O for plain files.
use_mmap = true
# Streaming buffer size in bytes.
buffer_size = 65536
